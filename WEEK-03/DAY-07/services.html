<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up page</title>

</head>
<style>
    body{
        background-color: beige;
    }
    .formcontent{
        background-color: rgb(178, 198, 214);
        
        height: 60vh;
        width: 50%;
        margin-left: 210px;
       
        border-radius: 13px;
    }
    .formcontent input
    {
        border: 1px rgb(9, 13, 17) solid;
        margin: 20px 10px;
    line-break: 1px;
    }
    .formcontent label{
        margin: 10px;
        text-align:start;
    }
    button{
        color: rgb(247, 156, 19);
        background-color:yellow;
        margin-left: 140px;
        margin-top: 10px;
        padding: 5px;
    }
    
</style>
<body>
    <div class="formcontent">
        <form id="signupForm">
            <label for="myname">Name:</label>
      <input type="text" name="name" id="myname" required>
      <br>
    
        <label for="numberInput">Adhar No:</label>
      <input 
    type="text" 
    id="numberInput" 
    name="numberInput" 
    pattern="\d{1,12}" 
    maxlength="12" 
    title="Enter up to 12 digits" 
    required
  ><br>
  <label for="Nation"> Nationality:</label>
  <select id="country" name="country" required>
    <option value="India">India</option>
    <option value="belgium">Belgium</option>
    <option value="Australia">Australia</option>
    <option value="USA">United Kingdom</option>
  </select>
  <br>
  <label for="phoneno">Contact Number:</label>
  <input type="text" id="phoneno" name="phone"pattern="\d{1,12}" 
    maxlength="10" required ><br>
    <label for="email">Email:</label>
    <input type="email" id="email" required> <br> 
    <label for="emailid">Alternate Email</label>
    <input type="email" name="emailid" id="Emailid">
    <label for="pnonenumber">Alternate Contact No.</label>
    <input type="text" id="phonenumber" >
    <button type="submit"> Sign Up</button>
    </form>
    <!-- Success message -->
        <p id="message" style="color:green; font-weight:bold; text-align:center; margin-top:10px;"></p>
    </div>
<!-- External JS -->
    <script src="script.js"></script>
</body>
</html>
