<h2>Edit Student</h2>
<form action="/update/{{ student.reg_number }}" method="POST">
    <label>Name:</label>
    <input type="text" name="name" value="{{ student.name }}" required><br><br>

    <label>Reg Number:</label>
    <input type="text" name="reg_number" value="{{ student.reg_number }}" required><br><br>

    <label>Email:</label>
    <input type="email" name="email" value="{{ student.email }}" required><br><br>

    <label>Course:</label>
    <input type="text" name="course" value="{{ student.course }}" required><br><br>

    <input type="submit" value="Update">
</form>
